<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Photo Vault — Map Summary</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" />
  <!-- Leaflet -->
  <link rel="stylesheet" href="vendor/leaflet.css" />
  <script src="vendor/leaflet.js"></script>
  <!-- JSZip (KMZ unzip) + togeojson (KML parsing) for the shared CAD overlay -->
  <script src="vendor/jszip.min.js"></script>
  <script src="vendor/togeojson.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="map-summary-body">

<header>
  <h1>🗺 Photo Map <span id="buildStamp" style="font-size:.55rem;font-weight:400;opacity:.7;vertical-align:middle;">build …</span></h1>
  <a id="backToGallery" class="secondary" href="index.html" style="text-decoration:none;padding:6px 12px;border-radius:7px;border:1px solid #334155;background:#273449;font-size:.82rem;font-weight:600;">← Gallery</a>
</header>

<div id="summaryMap"></div>

<p id="summaryStatus" class="status-bar">Loading photos…</p>

<!-- Slide-in details panel for a clicked photo -->
<aside id="photoDetail" class="photo-detail-panel" hidden>
  <button id="detailClose" class="detail-close" aria-label="Close">✕</button>
  <img id="detailImg" class="detail-img" alt="Selected photo" />
  <div id="detailMeta" class="detail-meta"></div>
</aside>

<script src="basemap.js"></script>
<script src="map.js"></script>
</body>
</html>
